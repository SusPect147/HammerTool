<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){const t=localStorage.getItem('cp_app_theme');if(t&&t!=='space')document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass - Community Forum</title>
    <meta name="description" content="Chat with the community, share ideas and discuss mapmaking on Compass.">
    <link rel="icon" href="./Resources/Additional/Icons/compass.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forum.css">
</head>
<body>
    <!-- Blurred Background Vortex -->
    <canvas id="vortexCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; filter:blur(15px); opacity:0.4;"></canvas>

    <!-- Top Nav -->
    <div class="top-bar">
        <a href="./index.html" class="logo">
            <img src="./Resources/Additional/Icons/compass.png" alt="" class="logo-icon">
            Compass
        </a>
        <div class="top-bar-right">
            <a href="./editor.html">Editor</a>
            <a href="./explore.html">Gallery</a>
            <a href="./dashboard.html">My Maps</a>
            <a href="./custom-tiles.html">Custom Tiles</a>
            <a href="./forum.html" class="active">Forum</a>
        </div>
    </div>

    <!-- Forum Container -->
    <main class="forum-container">
        <div class="forum-header">
            <h1>Bug Board</h1>
            <p>Report bugs, suggest improvements, and discuss issues with the editor.</p>
        </div>

        <!-- Composer Card -->
        <div class="composer-card">
            <textarea id="forumInput" class="composer-textarea" placeholder="Describe the bug in detail... (HTML/Scripts are stripped)"></textarea>
            
            <!-- Attachment Control -->
            <div class="composer-attachments-bar">
                <button type="button" id="attachPhotoBtn" class="attach-media-btn">
                    <span>📸</span> Attach Photo (0/5)
                </button>
                <button type="button" id="attachVideoBtn" class="attach-media-btn">
                    <span>🎥</span> Attach Video (0/2)
                </button>
                <input type="file" id="photoFileInput" accept="image/*" multiple style="display: none;">
                <input type="file" id="videoFileInput" accept="video/*" multiple style="display: none;">
            </div>
            
            <!-- Attachment Previews -->
            <div id="attachmentsPreview" class="attachments-preview-grid" style="display: none;"></div>

            <div class="composer-footer">
                <div class="composer-options">
                    <label class="anon-toggle">
                        <input type="checkbox" id="anonCheck">
                        <span>Post Anonymously</span>
                    </label>
                    <div id="cooldownDisplay" class="cooldown-timer" style="display: none;"></div>
                </div>
                <button id="submitMsgBtn" class="submit-btn">
                    <span>✈</span> Send Message
                </button>
            </div>
        </div>

        <!-- Feed -->
        <div class="feed-header-wrapper">
            <div class="sort-controls" id="forumSortControls">
                <button class="sort-tab active" data-sort="newest">Newest</button>
                <button class="sort-tab" data-sort="likes">Top Liked</button>
            </div>
        </div>
        <div id="messagesFeed" class="messages-feed">
            <div class="empty-feed">Loading community wall...</div>
        </div>
    </main>

    <div class="tooltip-floating">
        ?
        <div class="tooltip-text">
            This site is not affiliated with or endorsed by Supercell. Brawl Stars and all related assets belong to Supercell.
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./js/core/auth-global.js?v=1.0.6"></script>
    <script type="module" src="./js/pages/forum.js"></script>

    <!-- Canvas background script -->
    <script type="module" src="./js/common/particle-vortex-ambient.js"></script>
</body>
</html>
